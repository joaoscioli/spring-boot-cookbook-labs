services:
  postgres:
    image: postgres:16-alpine
    container_name: product-catalog-postgres
    environment:
      POSTGRES_DB: product_catalog
      POSTGRES_USER: product_catalog
      POSTGRES_PASSWORD: product_catalog
    ports:
      - "5432:5432"
    volumes:
      - product_catalog_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U product_catalog -d product_catalog"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: product-catalog-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: local-postgres
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/product_catalog
      SPRING_DATASOURCE_USERNAME: product_catalog
      SPRING_DATASOURCE_PASSWORD: product_catalog
    ports:
      - "8080:8080"

volumes:
  product_catalog_postgres_data:
